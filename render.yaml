services:
  - type: web
    name: loishvizo-boosting-solutions
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: DB_NAME
        value: smm_free
      - key: MYSQL_ROOT_PASS
        generateValue: true
      - key: PESAPAL_CONSUMER_KEY
        sync: false
      - key: PESAPAL_CONSUMER_SECRET
        sync: false
      - key: APP_TIMEZONE
        value: Africa/Kampala
    # NOTE: Free tier has ephemeral disk — DB is re-seeded from _sql/install.sql on every restart.
    # Upgrade to paid plan for persistent disk:
    # disk:
    #   name: loishvizo-db-data
    #   mountPath: /tmp/mysql_data
    #   sizeGB: 2
